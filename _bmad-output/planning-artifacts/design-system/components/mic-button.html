<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mic Button Component</title>
    <link rel="stylesheet" href="../variables.css">
    <link rel="stylesheet" href="mic-button.css">
    <style>body{padding:36px;background:radial-gradient(circle at bottom left, rgba(124,99,255,0.14), transparent 20%), var(--color-bg);color:var(--color-text);min-height:100vh;}</style>
  </head>
  <body>
    <div class="container">
      <h2>Mic Button (example)</h2>
      <button class="mic-fab" aria-label="Start recording">
        <span class="icon">🎤</span>
      </button>

      <div style="margin-top:12px">
        <div class="waveform" aria-hidden="true">
          <div class="bar" style="height:12px"></div>
          <div class="bar" style="height:20px"></div>
          <div class="bar" style="height:28px"></div>
          <div class="bar" style="height:16px"></div>
          <div class="bar" style="height:22px"></div>
        </div>
        <div class="mic-label">Gravando — toque para pausar</div>
      </div>
    </div>
  </body>
</html>
