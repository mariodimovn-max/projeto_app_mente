<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Transcript Block</title>
    <link rel="stylesheet" href="../variables.css">
    <link rel="stylesheet" href="transcript-block.css">
    <style>body{padding:36px;background:radial-gradient(circle at top left, rgba(79,209,202,0.12), transparent 20%), var(--color-bg);color:var(--color-text);min-height:100vh;}</style>
  </head>
  <body>
    <div class="container">
      <h2>Transcript — editable</h2>
      <div class="transcript" contenteditable="true" role="textbox" aria-label="Transcription">
        Eu me senti ansioso hoje porque... (toque para editar)
      </div>
      <div class="hint">Toque qualquer palavra para corrigir — <span class="edit">Salvar transcrição</span></div>
    </div>
  </body>
</html>
