<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Synthesis Card</title>
    <link rel="stylesheet" href="../variables.css">
    <link rel="stylesheet" href="synthesis-card.css">
    <style>body{padding:36px;background:radial-gradient(circle at top right, rgba(107,149,214,0.14), transparent 20%), var(--color-bg);color:var(--color-text);min-height:100vh;}</style>
  </head>
  <body>
    <div class="container">
      <h2>Synthesis Card</h2>
      <div class="synthesis-card" role="region" aria-label="Session synthesis">
        <h3>Resumo rápido</h3>
        <ul>
          <li>Pequenas vitórias ajudaram a reduzir ansiedade.</li>
          <li>Rotina noturna impacta qualidade do sono.</li>
        </ul>
        <div class="actions">
          <button class="btn btn-primary">Salvar insight</button>
          <button class="btn btn-ghost">Explorar mais</button>
        </div>
      </div>
    </div>
  </body>
</html>
