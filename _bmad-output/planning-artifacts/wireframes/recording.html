<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Wireframe — Recording / Chat</title>
    <link rel="stylesheet" href="../design-system/variables.css">
    <style>
      body{background:radial-gradient(circle at top right, rgba(127,208,200,0.16), transparent 25%), linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.15)), var(--color-bg);font-family:var(--font-sans);padding:24px;color:var(--color-text);position:relative;min-height:100vh;}
      body::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg, transparent 0 32px, rgba(255,255,255,0.03) 32px 33px), repeating-linear-gradient(90deg, transparent 0 32px, rgba(255,255,255,0.03) 32px 33px);opacity:0.08;pointer-events:none;}
      .stage{position:relative;z-index:1;max-width:720px;margin:0 auto}
      .chat{background:rgba(14,38,44,0.96);padding:22px;border-radius:22px;min-height:300px;box-shadow:0 16px 40px rgba(0,0,0,0.35);border:1px solid var(--color-border)}
      .message{padding:14px;border-radius:16px;max-width:80%;margin-bottom:12px;font-size:var(--fs-md);line-height:var(--lh-body)}
      .user{background:rgba(127,208,200,0.18);color:var(--color-surface);margin-left:auto}
      .agent{background:rgba(255,255,255,0.04);color:var(--color-text)}
      .mic-row{display:flex;align-items:center;justify-content:space-between;margin-top:22px}
      .mic-fab{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg, var(--color-accent-1), var(--color-accent-2));display:flex;align-items:center;justify-content:center;color:var(--color-surface);border:none;font-size:24px;box-shadow:0 16px 40px rgba(127,208,200,0.18)}
      .wave{width:60%;height:36px;background:rgba(255,255,255,0.06);border-radius:12px;display:flex;gap:4px;padding:6px;backdrop-filter:blur(4px)}
      .bar{width:6px;background:var(--color-accent-2);border-radius:2px;align-self:end}
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="chat" aria-live="polite">
        <div class="message agent">Olá, como você está hoje?</div>
        <div class="message user">Senti-me ansioso ao pensar em... (gravação enviada)</div>
      </div>
      <div class="mic-row">
        <div class="wave" aria-hidden="true">
          <div class="bar" style="height:12px"></div>
          <div class="bar" style="height:20px"></div>
          <div class="bar" style="height:28px"></div>
          <div class="bar" style="height:16px"></div>
        </div>
        <button class="mic-fab" onclick="location.href='synthesis.html'">🎤</button>
      </div>
    </div>
  </body>
</html>
